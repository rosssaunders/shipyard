<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>⚓ Shipyard</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { overscroll-behavior: none; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .pulse-dot { animation: pulse-dot 2s infinite; }
        .status-running { color: #fbbf24; }
        .status-done { color: #34d399; }
        .status-failed { color: #f87171; }
        .status-pending { color: #9ca3af; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; }
        .bottom-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col">
    <div id="app" class="flex-1 flex flex-col">
        <!-- Header -->
        <header class="flex items-center justify-between px-4 py-3 border-b border-zinc-800">
            <div class="flex items-center gap-2">
                <span class="text-2xl">⚓</span>
                <h1 class="text-lg font-bold" id="header-title">Shipyard</h1>
            </div>
            <div class="flex items-center gap-3">
                <span id="connection-dot" class="w-2 h-2 rounded-full bg-red-500"></span>
                <button onclick="showAddProject()" class="text-zinc-400 hover:text-white text-xl">+</button>
            </div>
        </header>

        <!-- Project tabs -->
        <div id="project-tabs" class="flex gap-1 px-3 pt-2 overflow-x-auto no-scrollbar">
        </div>

        <!-- View tabs -->
        <div id="view-tabs" class="flex gap-1 px-3 pt-2 hidden">
            <button onclick="switchView('agents')" id="tab-agents"
                class="px-3 py-1.5 rounded-lg text-xs font-medium bg-zinc-800 text-zinc-400">🔨 Agents</button>
            <button onclick="switchView('issues')" id="tab-issues"
                class="px-3 py-1.5 rounded-lg text-xs font-medium bg-zinc-800 text-zinc-400">📋 Issues</button>
        </div>

        <!-- Main content -->
        <main id="main-content" class="flex-1 overflow-y-auto px-3 py-3 space-y-3">
            <div class="text-center text-zinc-500 py-20">
                <p class="text-4xl mb-4">⚓</p>
                <p class="text-lg">No projects yet</p>
                <p class="text-sm mt-2">Tap + to connect a GitHub repo</p>
            </div>
        </main>

        <!-- Chat input -->
        <div class="border-t border-zinc-800 px-3 py-2 bottom-safe">
            <div class="flex gap-2">
                <input id="chat-input" type="text" placeholder="What should we build?"
                    class="flex-1 bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-zinc-500"
                    onkeydown="if(event.key==='Enter')sendCommand()">
                <button onclick="sendCommand()"
                    class="bg-blue-600 hover:bg-blue-500 rounded-xl px-4 py-2.5 text-sm font-medium">
                    Send
                </button>
            </div>
        </div>
    </div>

    <!-- Add Project Modal -->
    <div id="add-project-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-end sm:items-center justify-center">
        <div class="card w-full max-w-md p-5 mx-3 mb-3 sm:mb-0">
            <h2 class="text-lg font-bold mb-4">Add Project</h2>
            <div class="space-y-3">
                <input id="project-owner" type="text" placeholder="Owner (e.g. rosssaunders)"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-zinc-500">
                <input id="project-repo" type="text" placeholder="Repository (e.g. openassay)"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-zinc-500">
                <div class="flex gap-2 pt-2">
                    <button onclick="hideAddProject()" class="flex-1 bg-zinc-800 rounded-lg py-2 text-sm">Cancel</button>
                    <button onclick="addProject()" class="flex-1 bg-blue-600 rounded-lg py-2 text-sm font-medium">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dispatch Modal -->
    <div id="dispatch-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-end sm:items-center justify-center">
        <div class="card w-full max-w-md p-5 mx-3 mb-3 sm:mb-0">
            <h2 class="text-lg font-bold mb-1" id="dispatch-title">Launch Agent</h2>
            <p class="text-xs text-zinc-500 mb-4" id="dispatch-subtitle"></p>

            <div class="space-y-2 mb-4">
                <label class="text-xs text-zinc-400">Agent</label>
                <div class="grid grid-cols-2 gap-2" id="agent-options">
                    <button onclick="selectDispatchAgent('codex')" class="dispatch-agent-btn card p-3 text-left border-blue-500" data-agent="codex">
                        <div class="text-sm font-medium">Codex</div>
                        <div class="text-[10px] text-zinc-500">OpenAI · full-auto</div>
                    </button>
                    <button onclick="selectDispatchAgent('claude')" class="dispatch-agent-btn card p-3 text-left" data-agent="claude">
                        <div class="text-sm font-medium">Claude Code</div>
                        <div class="text-[10px] text-zinc-500">Anthropic · careful</div>
                    </button>
                </div>
            </div>

            <div class="space-y-2 mb-4">
                <label class="text-xs text-zinc-400">Model</label>
                <select id="dispatch-model" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none">
                    <option value="gpt-5.4">GPT-5.4</option>
                    <option value="gpt-5.4-pro">GPT-5.4 Pro</option>
                    <option value="gpt-5.3-codex">GPT-5.3 Codex</option>
                    <option value="claude-opus-4">Claude Opus 4</option>
                    <option value="claude-sonnet-4">Claude Sonnet 4</option>
                </select>
            </div>

            <div class="space-y-2 mb-4">
                <label class="text-xs text-zinc-400">After completion</label>
                <div class="space-y-1">
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" id="gate-tests" checked class="rounded"> Run tests
                    </label>
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" id="gate-clippy" checked class="rounded"> Clippy lint
                    </label>
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" id="gate-review" checked class="rounded"> AI code review
                    </label>
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" id="gate-merge" class="rounded"> Auto-merge if green
                    </label>
                </div>
            </div>

            <div class="space-y-2 mb-4">
                <label class="text-xs text-zinc-400">Extra instructions (optional)</label>
                <textarea id="dispatch-extra" rows="2" placeholder="e.g. Use the existing test patterns..."
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none resize-none"></textarea>
            </div>

            <div class="flex gap-2">
                <button onclick="hideDispatch()" class="flex-1 bg-zinc-800 rounded-lg py-2.5 text-sm">Cancel</button>
                <button onclick="confirmDispatch()" class="flex-1 bg-blue-600 rounded-lg py-2.5 text-sm font-medium">🚀 Launch</button>
            </div>
        </div>
    </div>

    <!-- Agent detail modal removed — using inline threaded view -->

    <script>
    // --- State ---
    let projects = [];
    let activeProjectId = null;
    let agents = {};
    let issues = {};
    let activeView = 'issues'; // default to issues
    let ws = null;
    let currentAgentId = null;

    // --- WebSocket ---
    function connectWs() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/ws`);
        ws.onopen = () => {
            document.getElementById('connection-dot').className = 'w-2 h-2 rounded-full bg-green-500 pulse-dot';
        };
        ws.onclose = () => {
            document.getElementById('connection-dot').className = 'w-2 h-2 rounded-full bg-red-500';
            setTimeout(connectWs, 3000);
        };
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            handleWsMessage(msg);
        };
    }

    function handleWsMessage(msg) {
        if (msg.type === 'agent_update') {
            loadAgents(msg.project_id);
        }
    }

    // --- API ---
    async function api(path, opts = {}) {
        const res = await fetch(`/api${path}`, {
            headers: { 'Content-Type': 'application/json' },
            ...opts,
            body: opts.body ? JSON.stringify(opts.body) : undefined,
        });
        return res.json();
    }

    // --- Projects ---
    async function loadProjects() {
        projects = await api('/projects');
        renderProjectTabs();
        if (projects.length > 0 && !activeProjectId) {
            selectProject(projects[0].id);
        }
        if (projects.length === 0) {
            renderEmpty();
        }
    }

    function renderProjectTabs() {
        const tabs = document.getElementById('project-tabs');
        tabs.innerHTML = projects.map(p => `
            <button onclick="selectProject('${p.id}')"
                class="px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap transition
                    ${p.id === activeProjectId ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-400 hover:text-white'}">
                ${p.repo}
            </button>
        `).join('');
    }

    async function selectProject(id) {
        activeProjectId = id;
        renderProjectTabs();
        document.getElementById('view-tabs').classList.remove('hidden');
        if (activeView === 'issues') {
            await loadIssues(id);
        } else {
            await loadAgents(id);
        }
    }

    function switchView(view) {
        activeView = view;
        document.getElementById('tab-agents').className =
            `px-3 py-1.5 rounded-lg text-xs font-medium ${view === 'agents' ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-400'}`;
        document.getElementById('tab-issues').className =
            `px-3 py-1.5 rounded-lg text-xs font-medium ${view === 'issues' ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-400'}`;
        if (activeProjectId) {
            if (view === 'issues') loadIssues(activeProjectId);
            else loadAgents(activeProjectId);
        }
    }

    // --- Issues ---
    async function loadIssues(projectId) {
        issues[projectId] = await api(`/projects/${projectId}/issues`);
        renderIssues();
    }

    function renderIssues() {
        const main = document.getElementById('main-content');
        const projectIssues = issues[activeProjectId] || [];

        if (projectIssues.length === 0) {
            main.innerHTML = `
                <div class="text-center text-zinc-500 py-12">
                    <p class="text-2xl mb-3">📋</p>
                    <p>No open issues</p>
                </div>`;
            return;
        }

        main.innerHTML = projectIssues.map(i => {
            const labels = (i.labels || []).map(l =>
                `<span class="px-1.5 py-0.5 rounded text-[10px]" style="background:${l.color ? '#'+l.color+'33' : '#333'};color:${l.color ? '#'+l.color : '#999'}">${escHtml(l.name)}</span>`
            ).join(' ');
            return `
            <div class="card p-4 active:bg-zinc-800 cursor-pointer" onclick="startIssue(${i.number}, '${escHtml(i.title).replace(/'/g,"\\'")}')">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-sm font-medium">#${i.number}</span>
                    <span class="text-xs text-zinc-600">${timeAgo(i.createdAt)}</span>
                </div>
                <p class="text-sm text-zinc-300 mb-2">${escHtml(i.title)}</p>
                <div class="flex gap-1 flex-wrap">${labels}</div>
            </div>`;
        }).join('');
    }

    // --- Dispatch ---
    let dispatchIssue = null;
    let dispatchAgent = 'codex';

    function startIssue(number, title) {
        dispatchIssue = { number, title };
        document.getElementById('dispatch-title').textContent = `#${number}`;
        document.getElementById('dispatch-subtitle').textContent = title;
        document.getElementById('dispatch-extra').value = '';
        document.getElementById('dispatch-modal').classList.remove('hidden');
        selectDispatchAgent('codex');
    }

    function selectDispatchAgent(agent) {
        dispatchAgent = agent;
        document.querySelectorAll('.dispatch-agent-btn').forEach(btn => {
            btn.classList.toggle('border-blue-500', btn.dataset.agent === agent);
            btn.classList.toggle('border-zinc-700', btn.dataset.agent !== agent);
        });
        // Update model options based on agent
        const modelSelect = document.getElementById('dispatch-model');
        if (agent === 'codex') {
            modelSelect.innerHTML = `
                <option value="gpt-5.4">GPT-5.4</option>
                <option value="gpt-5.4-pro">GPT-5.4 Pro</option>
                <option value="gpt-5.3-codex">GPT-5.3 Codex</option>
            `;
        } else {
            modelSelect.innerHTML = `
                <option value="claude-opus-4">Claude Opus 4</option>
                <option value="claude-sonnet-4">Claude Sonnet 4</option>
            `;
        }
    }

    function hideDispatch() {
        document.getElementById('dispatch-modal').classList.add('hidden');
        dispatchIssue = null;
    }

    async function confirmDispatch() {
        if (!dispatchIssue || !activeProjectId) return;
        const model = document.getElementById('dispatch-model').value;
        const extra = document.getElementById('dispatch-extra').value.trim();
        const gates = {
            tests: document.getElementById('gate-tests').checked,
            clippy: document.getElementById('gate-clippy').checked,
            review: document.getElementById('gate-review').checked,
            auto_merge: document.getElementById('gate-merge').checked,
        };

        await api('/tasks', {
            method: 'POST',
            body: {
                project_id: activeProjectId,
                issue_number: dispatchIssue.number,
                title: dispatchIssue.title,
                model,
                agent_type: dispatchAgent,
                quality_gates: gates,
                extra_instructions: extra || undefined,
            },
        });
        hideDispatch();
        switchView('agents');
    }

    function showAddProject() { document.getElementById('add-project-modal').classList.remove('hidden'); }
    function hideAddProject() { document.getElementById('add-project-modal').classList.add('hidden'); }

    async function addProject() {
        const owner = document.getElementById('project-owner').value.trim();
        const repo = document.getElementById('project-repo').value.trim();
        if (!owner || !repo) return;
        await api('/projects', { method: 'POST', body: { owner, repo } });
        hideAddProject();
        await loadProjects();
    }

    // --- Tasks ---
    let tasksList = {};

    async function loadAgents(projectId) {
        // Now loads tasks instead
        tasksList[projectId] = await api(`/projects/${projectId}/tasks`);
        renderTasks();
    }

    function renderTasks() {
        const main = document.getElementById('main-content');
        const tasks = tasksList[activeProjectId] || [];

        if (tasks.length === 0) {
            main.innerHTML = `
                <div class="text-center text-zinc-500 py-12">
                    <p class="text-2xl mb-3">🔨</p>
                    <p>No tasks yet</p>
                    <p class="text-sm mt-1">Tap an issue to start work</p>
                </div>`;
            return;
        }

        main.innerHTML = tasks.map(t => {
            const statusIcon = {
                running: '⚡', gates: '🔍', done: '✅', failed: '❌', killed: '💀', pending: '⏳'
            }[t.status] || '❓';

            const lastEvent = t.events.length > 0 ? t.events[t.events.length - 1] : null;
            const isActive = ['running', 'gates'].includes(t.status);

            return `
            <div class="card overflow-hidden" onclick="toggleTask('${t.id}')">
                <div class="p-4 active:bg-zinc-800 cursor-pointer">
                    <div class="flex items-center justify-between mb-1">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full ${statusColor(t.status)} ${isActive ? 'pulse-dot' : ''}"></span>
                            <span class="text-sm font-medium">${t.issue_number ? '#' + t.issue_number : t.id.slice(0, 8)}</span>
                        </div>
                        <span class="text-xs text-zinc-500">${t.agent_type} · ${t.model}</span>
                    </div>
                    <p class="text-sm text-zinc-300 mb-1">${escHtml(t.title)}</p>
                    ${lastEvent ? `<p class="text-xs text-zinc-500">${lastEvent.icon} ${escHtml(lastEvent.message)}</p>` : ''}
                </div>
                <div id="task-thread-${t.id}" class="hidden border-t border-zinc-800">
                    ${renderThread(t)}
                </div>
            </div>`;
        }).join('');
    }

    function renderThread(task) {
        if (task.events.length === 0) {
            return '<div class="px-4 py-3 text-xs text-zinc-600">Waiting for events...</div>';
        }

        const events = task.events.map(e => {
            const hasDetail = e.detail && e.detail.trim().length > 0;
            return `
            <div class="flex gap-3 px-4 py-2 ${e.kind === 'error' ? 'bg-red-950/20' : ''}">
                <div class="text-sm mt-0.5 shrink-0">${e.icon}</div>
                <div class="min-w-0 flex-1">
                    <p class="text-xs text-zinc-300">${escHtml(e.message)}</p>
                    ${hasDetail ? `<button onclick="event.stopPropagation(); toggleDetail(this)" class="text-[10px] text-zinc-600 hover:text-zinc-400 mt-0.5">Show detail ▾</button>
                    <pre class="hidden text-[10px] text-zinc-600 mt-1 max-h-40 overflow-auto whitespace-pre-wrap">${escHtml(e.detail)}</pre>` : ''}
                    <span class="text-[10px] text-zinc-700">${timeAgo(e.created_at)}</span>
                </div>
            </div>`;
        }).join('');

        const isActive = ['running', 'gates'].includes(task.status);
        const actions = isActive
            ? `<div class="px-4 py-2 border-t border-zinc-800">
                <button onclick="event.stopPropagation(); killTaskById('${task.id}')" class="text-xs text-red-400 bg-red-950/30 border border-red-900 rounded-lg px-3 py-1.5">Kill task</button>
               </div>`
            : '';

        return events + actions;
    }

    function toggleTask(id) {
        const el = document.getElementById(`task-thread-${id}`);
        if (el) el.classList.toggle('hidden');
    }

    function toggleDetail(btn) {
        const pre = btn.nextElementSibling;
        pre.classList.toggle('hidden');
        btn.textContent = pre.classList.contains('hidden') ? 'Show detail ▾' : 'Hide detail ▴';
    }

    async function killTaskById(id) {
        if (!confirm('Kill this task?')) return;
        await api(`/tasks/${id}/kill`, { method: 'POST' });
        if (activeProjectId) loadAgents(activeProjectId);
    }

    function renderEmpty() {
        document.getElementById('main-content').innerHTML = `
            <div class="text-center text-zinc-500 py-20">
                <p class="text-4xl mb-4">⚓</p>
                <p class="text-lg">No projects yet</p>
                <p class="text-sm mt-2">Tap + to connect a GitHub repo</p>
            </div>`;
    }

    // Agent detail modal removed — using inline threaded task view

    // --- Chat ---
    async function sendCommand() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !activeProjectId) return;
        input.value = '';

        // For now, spawn an agent with the text as prompt
        await api('/agents/spawn', {
            method: 'POST',
            body: { project_id: activeProjectId, prompt: text },
        });
        await loadAgents(activeProjectId);
    }

    // --- Helpers ---
    function statusColor(s) {
        return { running: 'bg-yellow-400', done: 'bg-green-400', failed: 'bg-red-400', killed: 'bg-red-400', pending: 'bg-zinc-400' }[s] || 'bg-zinc-400';
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function timeAgo(iso) {
        const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
        if (s < 60) return `${s}s ago`;
        if (s < 3600) return `${Math.floor(s/60)}m ago`;
        if (s < 86400) return `${Math.floor(s/3600)}h ago`;
        return `${Math.floor(s/86400)}d ago`;
    }

    // --- Init ---
    connectWs();
    loadProjects();

    // Auto-refresh active view every 10s
    setInterval(() => {
        if (activeProjectId && activeView === 'agents') loadAgents(activeProjectId);
    }, 10000);
    </script>
</body>
</html>
