<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shipyard</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
  --border: #2a2a2a; --text: #e5e5e5; --text2: #888;
  --accent: #3b82f6; --green: #22c55e; --red: #ef4444;
  --yellow: #eab308; --orange: #f97316;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* Header */
header {
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
header .badge {
  background: var(--surface2); border-radius: 12px; padding: 2px 10px;
  font-size: 12px; color: var(--text2);
}

/* Intent bar */
.intent-bar {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.intent-bar form { display: flex; gap: 8px; }
.intent-bar input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 16px; color: var(--text);
  font-size: 16px; outline: none;
}
.intent-bar input:focus { border-color: var(--accent); }
.intent-bar input::placeholder { color: var(--text2); }
.intent-bar button {
  background: var(--accent); border: none; border-radius: 12px;
  padding: 12px 20px; color: white; font-weight: 600; font-size: 15px;
  cursor: pointer;
}
.intent-bar button:active { opacity: 0.8; }

/* Tabs */
.tabs {
  display: flex; border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.tabs button {
  background: none; border: none; color: var(--text2);
  padding: 12px 16px; font-size: 14px; font-weight: 500;
  cursor: pointer; border-bottom: 2px solid transparent;
  position: relative;
}
.tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
.tabs .count {
  background: var(--red); color: white; font-size: 10px;
  border-radius: 8px; padding: 1px 6px; margin-left: 6px;
  font-weight: 700;
}

/* Feed */
.feed {
  flex: 1; overflow-y: auto; padding: 8px 0;
  -webkit-overflow-scrolling: touch;
}

.event {
  padding: 12px 20px; display: flex; gap: 12px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.event:active { background: var(--surface); }
.event .icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
.event .body { flex: 1; min-width: 0; }
.event .title { font-size: 14px; line-height: 1.4; }
.event .title strong { font-weight: 600; }
.event .meta {
  font-size: 12px; color: var(--text2); margin-top: 4px;
  display: flex; gap: 8px; align-items: center;
}
.event .repo-tag {
  background: var(--surface2); border-radius: 4px;
  padding: 1px 6px; font-size: 11px; color: var(--text2);
}
.event .detail {
  margin-top: 8px; background: var(--surface);
  border-radius: 8px; padding: 10px 12px;
  font-size: 12px; font-family: 'SF Mono', monospace;
  color: var(--text2); white-space: pre-wrap;
  max-height: 200px; overflow-y: auto;
  display: none;
}
.event .detail.open { display: block; }

/* Attention items */
.attention-item {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.attention-item .question {
  font-size: 15px; font-weight: 500; margin-bottom: 12px;
}
.attention-actions {
  display: flex; gap: 8px;
}
.attention-actions button {
  flex: 1; padding: 10px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-approve { background: var(--green); color: white; }
.btn-reject { background: var(--surface2); color: var(--text); border: 1px solid var(--border) !important; }
.btn-approve:active, .btn-reject:active { opacity: 0.8; }

/* Empty state */
.empty {
  text-align: center; padding: 60px 20px; color: var(--text2);
}
.empty .emoji { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 15px; line-height: 1.5; }

/* Status indicators */
.status-dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}
.status-dot.running { background: var(--accent); animation: pulse 2s infinite; }
.status-dot.done { background: var(--green); }
.status-dot.failed { background: var(--red); }
.status-dot.attention { background: var(--orange); animation: pulse 1.5s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Setup overlay */
.setup-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 40px; z-index: 100;
}
.setup-overlay h2 { font-size: 24px; margin-bottom: 8px; }
.setup-overlay p { color: var(--text2); margin-bottom: 24px; text-align: center; }
.setup-overlay input {
  width: 100%; max-width: 320px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 16px; color: var(--text); font-size: 16px;
  outline: none; margin-bottom: 12px;
}
.setup-overlay button {
  width: 100%; max-width: 320px; background: var(--accent);
  border: none; border-radius: 12px; padding: 14px;
  color: white; font-weight: 600; font-size: 16px; cursor: pointer;
}

/* Issue cards */
.issue-card {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; gap: 12px; align-items: flex-start;
  cursor: pointer; transition: background 0.15s;
}
.issue-card:active { background: var(--surface); }
.issue-card .issue-num {
  color: var(--text2); font-size: 13px; font-weight: 500;
  flex-shrink: 0; min-width: 36px;
}
.issue-card .issue-body { flex: 1; min-width: 0; }
.issue-card .issue-title {
  font-size: 14px; font-weight: 500; line-height: 1.4;
}
.issue-card .issue-labels {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px;
}
.issue-card .label {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: var(--surface2); color: var(--text2);
}
.issue-card .label.p0 { background: #3b1111; color: var(--red); }
.issue-card .label.phase1 { background: #1a2332; color: var(--accent); }
.issue-card .launch-btn {
  flex-shrink: 0; background: var(--accent); border: none;
  border-radius: 8px; padding: 8px 14px; color: white;
  font-size: 13px; font-weight: 600; cursor: pointer;
  align-self: center;
}
.issue-card .launch-btn:active { opacity: 0.8; }
.issue-card .launch-btn.launched {
  background: var(--surface2); color: var(--text2);
  pointer-events: none;
}

/* Live output panel */
.live-panel {
  position: fixed; inset: 0; background: var(--bg); z-index: 50;
  display: flex; flex-direction: column;
}
.live-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.live-header h2 { font-size: 16px; font-weight: 600; }
.live-header .close-btn {
  background: var(--surface2); border: none; border-radius: 8px;
  padding: 6px 14px; color: var(--text); font-size: 14px; cursor: pointer;
}
.live-status {
  padding: 8px 20px; border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center; font-size: 13px; color: var(--text2);
}
.live-output {
  flex: 1; overflow-y: auto; padding: 12px 20px;
  font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px;
  line-height: 1.6; white-space: pre-wrap; word-break: break-all;
  color: var(--text2); -webkit-overflow-scrolling: touch;
}
.live-output .line-read { color: #64748b; }
.live-output .line-write { color: #22c55e; }
.live-output .line-run { color: #eab308; }
.live-output .line-error { color: #ef4444; }
.live-output .line-think { color: #8b5cf6; }
.live-output .line-commit { color: #3b82f6; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Setup: add project on first run -->
<div id="setup" class="setup-overlay hidden">
  <h2>⚓ Shipyard</h2>
  <p>Add a GitHub repo to get started</p>
  <input id="setup-owner" placeholder="Owner (e.g. rosssaunders)" />
  <input id="setup-repo" placeholder="Repo (e.g. openassay)" />
  <button onclick="addProject()">Add Project</button>
</div>

<!-- Main app -->
<header>
  <h1>⚓ Shipyard</h1>
  <span id="header-badge" class="badge">0 active</span>
</header>

<div class="intent-bar">
  <form onsubmit="submitIntent(event)">
    <input id="intent-input" placeholder="What do you want built?" autocomplete="off" />
    <button type="submit">Go</button>
  </form>
</div>

<div class="tabs">
  <button class="active" onclick="switchTab('feed', this)">Feed</button>
  <button onclick="switchTab('backlog', this)">
    Backlog <span id="backlog-count" class="count hidden">0</span>
  </button>
  <button onclick="switchTab('skills', this)">Skills</button>
  <button onclick="switchTab('attention', this)">
    Needs You <span id="attention-count" class="count hidden">0</span>
  </button>
</div>

<!-- Live output panel -->
<div id="live-panel" class="live-panel hidden">
  <div class="live-header">
    <h2 id="live-title">Agent Output</h2>
    <button class="close-btn" onclick="closeLive()">✕ Close</button>
  </div>
  <div class="live-status">
    <span class="status-dot running" id="live-dot"></span>
    <span id="live-status-text">Running...</span>
    <span style="margin-left:auto" id="live-size">0 KB</span>
  </div>
  <div class="live-output" id="live-output"></div>
</div>

<div id="feed-view" class="feed"></div>
<div id="backlog-view" class="feed hidden"></div>
<div id="skills-view" class="feed hidden">
  <div style="padding: 16px 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <span style="font-size: 14px; color: var(--text2);">Project knowledge injected into every agent prompt</span>
      <button onclick="generateSkills()" style="background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; color: var(--text); font-size: 13px; cursor: pointer;">🧠 Auto-generate</button>
    </div>
    <textarea id="skills-editor" style="width: 100%; min-height: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-family: 'SF Mono', monospace; font-size: 13px; line-height: 1.5; resize: vertical; outline: none;" placeholder="# Project Skills&#10;&#10;## Build&#10;- cargo test --release&#10;&#10;## Gotchas&#10;- WASM: use thread_local! not tokio::task_local!"></textarea>
    <button onclick="saveSkills()" style="margin-top: 8px; background: var(--accent); border: none; border-radius: 8px; padding: 10px 20px; color: white; font-weight: 600; font-size: 14px; cursor: pointer; width: 100%;">Save</button>
  </div>
</div>
<div id="attention-view" class="feed hidden"></div>

<script>
const API = '';
let projects = [];
let activeTab = 'feed';
let feedEvents = [];

// --- Init ---
async function init() {
  const res = await fetch(`${API}/api/projects`);
  projects = await res.json();
  if (projects.length === 0) {
    document.getElementById('setup').classList.remove('hidden');
  } else {
    loadFeed();
    // Poll feed every 5s
    setInterval(loadFeed, 5000);
  }
}

async function addProject() {
  const owner = document.getElementById('setup-owner').value.trim();
  const repo = document.getElementById('setup-repo').value.trim();
  if (!owner || !repo) return;
  const res = await fetch(`${API}/api/projects`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ owner, repo }),
  });
  if (res.ok) {
    projects = [await res.json()];
    document.getElementById('setup').classList.add('hidden');
    loadFeed();
    setInterval(loadFeed, 5000);
  }
}

// --- Intent ---
async function submitIntent(e) {
  e.preventDefault();
  const input = document.getElementById('intent-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.disabled = true;

  // Send to brain
  const res = await fetch(`${API}/api/intent`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text,
      project_id: projects[0]?.id,
    }),
  });

  input.disabled = false;
  input.focus();
  if (res.ok) loadFeed();
}

// --- Feed ---
async function loadFeed() {
  if (activeTab !== 'feed') return;
  try {
    const res = await fetch(`${API}/api/feed`);
    if (!res.ok) return;
    feedEvents = await res.json();
    renderFeed();
    updateBadge();
  } catch (e) { /* offline */ }
}

function renderFeed() {
  renderFeedWithLive();
}

function toggleDetail(el) {
  const d = el.querySelector('.detail');
  if (d) d.classList.toggle('open');
}

// --- Attention ---
async function loadAttention() {
  try {
    const res = await fetch(`${API}/api/attention`);
    if (!res.ok) return;
    const items = await res.json();
    renderAttention(items);
    const countEl = document.getElementById('attention-count');
    if (items.length > 0) {
      countEl.textContent = items.length;
      countEl.classList.remove('hidden');
    } else {
      countEl.classList.add('hidden');
    }
  } catch (e) {}
}

function renderAttention(items) {
  const el = document.getElementById('attention-view');
  if (items.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <div class="emoji">✨</div>
        <p>Nothing needs your attention.<br>Everything is running smoothly.</p>
      </div>`;
    return;
  }
  el.innerHTML = items.map(item => `
    <div class="attention-item">
      <div class="question">${item.icon} ${item.message}</div>
      <div class="attention-actions">
        <button class="btn-approve" onclick="resolveAttention('${item.id}', 'approve')">Approve</button>
        <button class="btn-reject" onclick="resolveAttention('${item.id}', 'reject')">Reject</button>
      </div>
    </div>
  `).join('');
}

async function resolveAttention(id, action) {
  await fetch(`${API}/api/attention/${id}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action }),
  });
  loadAttention();
  loadFeed();
}

// --- Backlog ---
let backlogIssues = [];
let launchedIssues = new Set();

async function loadBacklog() {
  if (!projects.length) return;
  try {
    const res = await fetch(`${API}/api/projects/${projects[0].id}/issues`);
    if (!res.ok) return;
    backlogIssues = await res.json();
    renderBacklog();
    const countEl = document.getElementById('backlog-count');
    countEl.textContent = backlogIssues.length;
    if (backlogIssues.length > 0) countEl.classList.remove('hidden');
  } catch (e) {}
}

function renderBacklog() {
  const el = document.getElementById('backlog-view');
  if (backlogIssues.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <div class="emoji">📋</div>
        <p>No open issues.<br>Your backlog is clean!</p>
      </div>`;
    return;
  }
  el.innerHTML = backlogIssues.map(issue => {
    const launched = launchedIssues.has(issue.number);
    const labels = (issue.labels || []).map(l => {
      const cls = l.name === 'P0' ? 'p0' : l.name?.startsWith('phase') ? 'phase1' : '';
      return `<span class="label ${cls}">${escHtml(l.name || l)}</span>`;
    }).join('');
    return `
      <div class="issue-card">
        <span class="issue-num">#${issue.number}</span>
        <div class="issue-body">
          <div class="issue-title">${escHtml(issue.title)}</div>
          <div class="issue-labels">${labels}</div>
        </div>
        <button class="launch-btn ${launched ? 'launched' : ''}"
                onclick="event.stopPropagation(); launchIssue(${issue.number}, '${escAttr(issue.title)}', this)">
          ${launched ? '✓ Sent' : '▶ Go'}
        </button>
      </div>`;
  }).join('');
}

async function launchIssue(number, title, btn) {
  if (launchedIssues.has(number)) return;
  launchedIssues.add(number);
  btn.textContent = '...';
  btn.classList.add('launched');

  await fetch(`${API}/api/intent`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text: `Fix issue #${number}: ${title}`,
      project_id: projects[0]?.id,
      issue_number: number,
    }),
  });

  btn.textContent = '✓ Sent';
  // Switch to feed to watch it
  setTimeout(() => {
    document.querySelector('.tabs button').click();
  }, 500);
}

function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// --- Live Output ---
let liveTaskId = null;
let liveOffset = 0;
let liveInterval = null;

function openLive(taskId, title) {
  liveTaskId = taskId;
  liveOffset = 0;
  document.getElementById('live-panel').classList.remove('hidden');
  document.getElementById('live-title').textContent = title || 'Agent Output';
  document.getElementById('live-output').innerHTML = '';
  pollLive();
  liveInterval = setInterval(pollLive, 2000);
}

function closeLive() {
  document.getElementById('live-panel').classList.add('hidden');
  liveTaskId = null;
  if (liveInterval) { clearInterval(liveInterval); liveInterval = null; }
}

async function pollLive() {
  if (!liveTaskId) return;
  try {
    const res = await fetch(`${API}/api/tasks/${liveTaskId}/output?offset=${liveOffset}`);
    const data = await res.json();
    if (data.output) {
      const el = document.getElementById('live-output');
      el.innerHTML += colorize(escHtml(data.output));
      liveOffset = data.offset;
      el.scrollTop = el.scrollHeight;
      document.getElementById('live-size').textContent = `${(liveOffset/1024).toFixed(1)} KB`;
    }
    const dot = document.getElementById('live-dot');
    const status = document.getElementById('live-status-text');
    if (data.running) {
      dot.className = 'status-dot running';
      status.textContent = 'Running...';
    } else {
      dot.className = 'status-dot done';
      status.textContent = 'Finished';
      if (liveInterval) { clearInterval(liveInterval); liveInterval = null; }
    }
  } catch (e) {}
}

function colorize(text) {
  return text.split('\n').map(line => {
    if (line.match(/reading|read |scanning|inspecting/i)) return `<span class="line-read">${line}</span>`;
    if (line.match(/writing|wrote|creating|created/i)) return `<span class="line-write">${line}</span>`;
    if (line.match(/running|cargo test|cargo clippy|npm |exec/i)) return `<span class="line-run">${line}</span>`;
    if (line.match(/error|failed|panic/i)) return `<span class="line-error">${line}</span>`;
    if (line.match(/thinking|analyzing|planning|consider/i)) return `<span class="line-think">${line}</span>`;
    if (line.match(/commit|push|merge|branch/i)) return `<span class="line-commit">${line}</span>`;
    return line;
  }).join('\n');
}

// Make feed events tappable for live view
function renderFeedWithLive() {
  const el = document.getElementById('feed-view');
  if (feedEvents.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <div class="emoji">⚓</div>
        <p>Nothing happening yet.<br>Tell me what you want built.</p>
      </div>`;
    return;
  }

  // Group events by task
  const tasks = {};
  feedEvents.forEach(ev => {
    const tid = ev.task_id || ev.id;
    if (!tasks[tid]) tasks[tid] = { events: [], status: ev.task_status, title: '', id: tid };
    tasks[tid].events.push(ev);
    if (ev.message.startsWith('Intent received:')) tasks[tid].title = ev.message.replace('Intent received: ', '');
    if (!tasks[tid].title && ev.message.includes('Complexity')) tasks[tid].title = ev.message;
  });

  // Render as task cards with latest event
  el.innerHTML = Object.values(tasks).map(task => {
    const latest = task.events[0];
    const isRunning = task.status === 'running';
    return `
      <div class="event" onclick="${isRunning ? `openLive('${task.id}', '${escAttr(task.title)}')` : `toggleDetail(this)`}" style="${isRunning ? 'cursor:pointer; border-left: 3px solid var(--accent);' : ''}">
        <div class="icon">${latest.icon}</div>
        <div class="body">
          <div class="title">${isRunning ? '🔴 ' : ''}${latest.message}</div>
          <div class="meta">
            <span class="status-dot ${task.status || ''}"></span>
            <span>${timeAgo(latest.created_at)}</span>
            ${latest.repo ? `<span class="repo-tag">${latest.repo}</span>` : ''}
            ${isRunning ? '<span style="color:var(--accent)">tap to watch →</span>' : ''}
          </div>
          ${!isRunning && task.events.length > 1 ? `<div class="detail">${task.events.map(e => `${e.icon} ${e.message}`).join('\n')}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// --- Skills ---
async function loadSkills() {
  if (!projects.length) return;
  try {
    const res = await fetch(`${API}/api/projects/${projects[0].id}/skills`);
    const data = await res.json();
    document.getElementById('skills-editor').value = data.skills || '';
  } catch (e) {}
}

async function saveSkills() {
  if (!projects.length) return;
  const skills = document.getElementById('skills-editor').value;
  await fetch(`${API}/api/projects/${projects[0].id}/skills`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ skills }),
  });
  alert('Skills saved ✓');
}

async function generateSkills() {
  if (!projects.length) return;
  const btn = event.target;
  btn.textContent = '🧠 Generating...';
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/api/projects/${projects[0].id}/skills/generate`, { method: 'POST' });
    const data = await res.json();
    if (data.skills) {
      document.getElementById('skills-editor').value = data.skills;
    } else {
      alert(data.error || 'Failed to generate');
    }
  } catch (e) {
    alert('Generation failed');
  }
  btn.textContent = '🧠 Auto-generate';
  btn.disabled = false;
}

// --- Tabs ---
function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('feed-view').classList.toggle('hidden', tab !== 'feed');
  document.getElementById('backlog-view').classList.toggle('hidden', tab !== 'backlog');
  document.getElementById('skills-view').classList.toggle('hidden', tab !== 'skills');
  document.getElementById('attention-view').classList.toggle('hidden', tab !== 'attention');
  if (tab === 'attention') loadAttention();
  if (tab === 'backlog') loadBacklog();
  if (tab === 'skills') loadSkills();
  if (tab === 'feed') loadFeed();
}

function updateBadge() {
  const active = feedEvents.filter(e => e.task_status === 'running').length;
  document.getElementById('header-badge').textContent = `${active} active`;
}

// --- Helpers ---
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
